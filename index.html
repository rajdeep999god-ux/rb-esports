    <script>

        .bottom-nav {

        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            .mobile-only-padding { padding-bottom: 0px; }
        }
        @media (max-width: 767px) {
            .mobile-only-padding { padding-bottom: 80px; }
        }

        .nav-link { text-align: center; color: #64748b; text-decoration: none; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-link.active { color: #38bdf8; font-weight: bold; }
